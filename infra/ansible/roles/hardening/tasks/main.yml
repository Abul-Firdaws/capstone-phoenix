---
# Quick, real hardening. Skippable if you are extremely tight on time —
# it does not block the cluster from working, it just makes the nodes safer.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
  changed_when: false

- name: Ensure ufw is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow Kubernetes API through ufw (SG already restricts this to your IP)
  community.general.ufw:
    rule: allow
    port: '6443'
    proto: tcp

- name: Allow HTTP/HTTPS through ufw
  community.general.ufw:
    rule: allow
    port: '{{ item }}'
    proto: tcp
  loop:
    - '80'
    - '443'

- name: Enable ufw with default-deny
  community.general.ufw:
    state: enabled
    policy: deny

---
- name: Check if k3s is already installed on this worker
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s agent and join the cluster
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://{{ hostvars[groups['control_plane'][0]]['private_ip'] }}:6443 \
    K3S_TOKEN={{ hostvars[groups['control_plane'][0]]['k3s_node_token'] }} \
    sh -
  when: not k3s_bin.stat.exists
